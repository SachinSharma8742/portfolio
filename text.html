<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Animation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<style>
    body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
    gap: 20px;
}

.box {
    position: relative;
    width: 100px;
    height: 100px;
    background-color: #3498db;
    transition: all 0.5s ease;
    cursor: pointer;
}

.box::before {
    content: attr(data-text);
    position: absolute;
    
    left: 50%;
    transform: translate(-50%, -100%);
    opacity: 0;
    color: white;
    font-size: 14px;
    transition: opacity 0.5s ease;
}

.green {
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.1), inset 0 0 5px rgba(0, 255, 0, 0.2);
}

.yellow {
    box-shadow: 0 0 10px rgba(255, 255, 0, 0.1), inset 0 0 5px rgba(255, 255, 0, 0.2);
}

.red {
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.1), inset 0 0 5px rgba(255, 0, 0, 0.2);
}

.box:hover {
    transform: scale(1.1);
}

.green:hover {
    box-shadow: 0 0 30px rgba(0, 255, 0, 0.5), inset 0 0 15px rgba(0, 255, 0, 0.4);
}

.yellow:hover {
    box-shadow: 0 0 30px rgba(255, 255, 0, 0.5), inset 0 0 15px rgba(255, 255, 0, 0.4);
}

.red:hover {
    box-shadow: 0 0 30px rgba(255, 0, 0, 0.5), inset 0 0 15px rgba(255, 0, 0, 0.4);
}

.box:hover::before {
    opacity: 1;
}

</style>
<body>
    <div class="box green" data-text="Green Box"></div>
    <div class="box yellow" data-text="Yellow Box"></div>
    <div class="box red" data-text="Red Box"></div>
</body>
</html>
